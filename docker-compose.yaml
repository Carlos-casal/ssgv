services:
  # Base de datos (MySQL)
  database:
    image: mysql:8.0
    container_name: symfony_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_voluntarios
    ports:
      - "3306:3306"

  # El motor de PHP
  php:
    build: .
    container_name: symfony_php
    volumes:
      - .:/var/www/symfony
    depends_on:
      - database

  # El servidor web (Nginx)
  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/symfony
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php